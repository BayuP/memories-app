<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Checkpoint Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #EDE9E3;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #F5F3EF;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 24px 80px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.10);
  display: flex; flex-direction: column;
}
.notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 120px; height: 34px; background: #EDE9E3;
  border-radius: 0 0 20px 20px; z-index: 10;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #1A1A1A; }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* Detail header */
.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  flex-shrink: 0;
}
.back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

/* Scroll */
.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 0 20px 40px;
  scrollbar-width: none;
}
.scroll-content::-webkit-scrollbar { display: none; }

/* Title */
.detail-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 28px;
  color: #1A1A1A;
  margin-bottom: 6px;
  line-height: 1.2;
}
.detail-meta {
  font-size: 13px;
  color: #8A8580;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 6px;
}
.meta-dot { color: #D0CCC8; }

/* Photo viewer */
.photo-viewer {
  width: 100%;
  height: 252px;
  border-radius: 16px;
  background: linear-gradient(135deg, #FFB347 0%, #FF8C69 30%, #4FC3F7 70%, #0288D1 100%);
  position: relative;
  overflow: hidden;
  margin-bottom: 18px;
}
.photo-counter {
  position: absolute; bottom: 12px; right: 12px;
  background: rgba(0,0,0,0.45);
  color: #FFFFFF;
  font-size: 11px; font-weight: 600;
  padding: 4px 9px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}

/* Collab avatars under photo */
.collab-row {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 20px;
}
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid #F5F3EF;
  font-size: 9px; font-weight: 600; color: #fff;
  display: flex; align-items: center; justify-content: center;
}
.avatar-a { background: linear-gradient(135deg, #E8A87C, #D4748E); }
.avatar-b { background: linear-gradient(135deg, #7E94C9, #5B6F9C); }
.avatar-c { background: linear-gradient(135deg, #8EBF9E, #4A8C6A); }
.more-avatars { font-size: 12px; color: #8A8580; margin-left: 4px; }

/* Section */
.section-label {
  font-size: 12px; font-weight: 600;
  color: #B5B0AA;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
}
.feeling-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: #F0ECE6;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 14px; font-weight: 500; color: #1A1A1A;
  margin-bottom: 20px;
}
.body-text {
  font-size: 15px;
  color: #1A1A1A;
  line-height: 1.65;
  margin-bottom: 20px;
}
.thoughts-text {
  font-size: 14px;
  color: #1A1A1A;
  line-height: 1.7;
  margin-bottom: 24px;
}

/* Photos strip */
.photos-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.see-all { font-size: 13px; color: #8A8580; cursor: pointer; }
.photo-strip {
  display: flex; gap: 8px;
}
.strip-thumb {
  width: 92px; height: 92px;
  border-radius: 10px;
  flex-shrink: 0;
}
.divider {
  height: 1px;
  background: #E8E4DE;
  margin: 0 0 20px;
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1A1A1A"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#1A1A1A"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#1A1A1A"/><circle cx="8" cy="10" r="1.5" fill="#1A1A1A"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1A1A1A" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#1A1A1A"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#1A1A1A" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="detail-header">
    <div class="back-btn">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="5" cy="10" r="1.8" fill="#1A1A1A"/>
      <circle cx="10" cy="5" r="1.8" fill="#1A1A1A"/>
      <circle cx="15" cy="10" r="1.8" fill="#1A1A1A"/>
      <path d="M6.5 9.2L8.7 6.2M6.5 10.8L8.7 13.8" stroke="#1A1A1A" stroke-width="1.3"/>
    </svg>
  </div>

  <div class="scroll-content">

    <div class="detail-title">Beach Day 🏖</div>
    <div class="detail-meta">
      <span>May 10, 2024</span>
      <span class="meta-dot">·</span>
      <span>Padang Padang Beach</span>
    </div>

    <!-- Photo viewer -->
    <div class="photo-viewer">
      <div class="photo-counter">1 / 6</div>
    </div>

    <!-- Collaborators -->
    <div class="collab-row">
      <div class="avatar avatar-a" style="margin-left:0;">Y</div>
      <div class="avatar avatar-b" style="margin-left:-6px;">F</div>
      <div class="avatar avatar-c" style="margin-left:-6px;">R</div>
      <span class="more-avatars">+2</span>
    </div>

    <div class="divider"></div>

    <!-- Feeling -->
    <div class="section-label">Feelings</div>
    <div class="feeling-pill">
      <span>Excited</span>
      <span>🤩</span>
    </div>

    <!-- What's happening -->
    <div class="section-label">Moment</div>
    <div class="body-text">Beach day with the best people!</div>

    <div class="divider"></div>

    <!-- Thoughts -->
    <div class="section-label">Thoughts</div>
    <div class="thoughts-text">
      The water was so clear and cold. We spent the whole day here, talking about everything and nothing. One of those days you wish could last forever.
    </div>

    <div class="divider"></div>

    <!-- Photos -->
    <div class="photos-header">
      <div class="section-label" style="margin-bottom:0;">Photos</div>
      <span class="see-all">See all</span>
    </div>
    <div class="photo-strip">
      <div class="strip-thumb" style="background: linear-gradient(135deg, #4FC3F7, #0288D1);"></div>
      <div class="strip-thumb" style="background: linear-gradient(135deg, #FFB347, #FF8C69);"></div>
      <div class="strip-thumb" style="background: linear-gradient(135deg, #8EBF9E, #4A8C6A);"></div>
    </div>

  </div>

</div>
</body>
</html>
