<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #EDE9E3;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}

.phone {
  width: 390px;
  height: 844px;
  background: #F5F3EF;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.08),
    0 24px 80px rgba(0,0,0,0.22),
    0 8px 24px rgba(0,0,0,0.10);
  display: flex;
  flex-direction: column;
}

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px 0;
  flex-shrink: 0;
}
.status-time {
  font-size: 15px;
  font-weight: 600;
  color: #1A1A1A;
  letter-spacing: -0.3px;
}
.status-icons {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Notch */
.notch {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #EDE9E3;
  border-radius: 0 0 20px 20px;
  z-index: 10;
}

/* Scroll content */
.scroll-content {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 100px;
  scrollbar-width: none;
}
.scroll-content::-webkit-scrollbar { display: none; }

/* Hero header */
.hero-header {
  padding: 28px 0 24px;
}
.hero-header h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 32px;
  color: #1A1A1A;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.hero-header p {
  font-size: 14px;
  color: #8A8580;
  line-height: 1.5;
}

/* Section header */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-size: 16px;
  font-weight: 600;
  color: #1A1A1A;
}
.section-link {
  font-size: 13px;
  color: #8A8580;
  text-decoration: none;
}

/* Featured card */
.featured-card {
  border-radius: 16px;
  height: 200px;
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #E8A87C 0%, #D4748E 30%, #7E94C9 65%, #5B6F9C 100%);
}
.featured-card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.08) 55%, transparent 100%);
}
.featured-card-content {
  position: absolute;
  bottom: 16px;
  left: 16px;
  right: 16px;
}
.featured-card-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 22px;
  color: #FFFFFF;
  margin-bottom: 4px;
}
.featured-card-meta {
  font-size: 12px;
  color: rgba(255,255,255,0.82);
  margin-bottom: 8px;
}
.avatar-stack {
  display: flex;
  align-items: center;
}
.avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid #FFFFFF;
  margin-left: -6px;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.avatar:first-child { margin-left: 0; }
.avatar-a { background: linear-gradient(135deg, #E8A87C, #D4748E); }
.avatar-b { background: linear-gradient(135deg, #7E94C9, #5B6F9C); }
.avatar-c { background: linear-gradient(135deg, #8EBF9E, #4A8C6A); }
.avatar-d { background: linear-gradient(135deg, #C9A87E, #8C6A4A); }
.avatar-sm { width: 20px; height: 20px; font-size: 8px; border-width: 1.5px; }

/* Compact card */
.compact-card {
  background: #FFFFFF;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  border: 1px solid #E8E4DE;
  transition: all 0.2s ease;
  cursor: pointer;
}
.compact-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.07);
}
.compact-thumb {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  flex-shrink: 0;
  background: linear-gradient(135deg, #A8C5D4 0%, #6E9DB5 50%, #4A7A96 100%);
}
.compact-info {
  flex: 1;
}
.compact-title {
  font-size: 14px;
  font-weight: 600;
  color: #1A1A1A;
  margin-bottom: 3px;
}
.compact-meta {
  font-size: 12px;
  color: #8A8580;
  margin-bottom: 6px;
}
.compact-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* New journey button */
.btn-new-journey {
  width: 100%;
  background: #1A1A1A;
  color: #FFFFFF;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s ease;
  margin-top: 4px;
}
.btn-new-journey:hover {
  background: #2A2A2A;
}

/* Journeys section */
.section {
  margin-bottom: 24px;
}

/* Bottom nav */
.bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 88px;
  background: #FFFFFF;
  border-top: 1px solid #E8E4DE;
  display: flex;
  align-items: flex-start;
  justify-content: space-around;
  padding-top: 10px;
  border-radius: 0 0 44px 44px;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  width: 56px;
  padding: 4px 0;
}
.nav-label {
  font-size: 10px;
  font-weight: 500;
  color: #B5B0AA;
}
.nav-label.active { color: #1A1A1A; }
.nav-add-btn {
  width: 48px;
  height: 48px;
  background: #1A1A1A;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-top: -10px;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.nav-add-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/>
        <rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/>
        <rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1A1A1A"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#1A1A1A"/>
        <path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#1A1A1A"/>
        <circle cx="8" cy="10" r="1.5" fill="#1A1A1A"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1A1A1A" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1A1A1A"/>
        <path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#1A1A1A" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Scroll Content -->
  <div class="scroll-content">

    <!-- Hero header -->
    <div class="hero-header">
      <h1>Memories</h1>
      <p>Collect moments. Share feelings. Create stories.</p>
    </div>

    <!-- Journeys section -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Your journeys</span>
        <a href="#" class="section-link">See all</a>
      </div>

      <!-- Featured large card -->
      <div class="featured-card">
        <div class="featured-card-overlay"></div>
        <div class="featured-card-content">
          <div class="featured-card-title">Bali Trip 🌴</div>
          <div class="featured-card-meta">May 8 – May 15, 2024</div>
          <div class="avatar-stack">
            <div class="avatar avatar-a" style="font-size:9px;">Y</div>
            <div class="avatar avatar-b" style="font-size:9px;">F</div>
            <div class="avatar avatar-c" style="font-size:9px;">R</div>
          </div>
        </div>
      </div>

      <!-- Compact card -->
      <div class="compact-card">
        <div class="compact-thumb" style="background: linear-gradient(135deg, #C5A8D4 0%, #9070B5 50%, #6A4A8C 100%);"></div>
        <div class="compact-info">
          <div class="compact-title">Weekend Hangout 🏙</div>
          <div class="compact-meta">April 20, 2024</div>
          <div class="avatar-stack">
            <div class="avatar avatar-sm avatar-a">Y</div>
            <div class="avatar avatar-sm avatar-d">M</div>
          </div>
        </div>
        <div class="compact-right">
          <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M1 1L6 6L1 11" stroke="#B5B0AA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Another compact card -->
      <div class="compact-card">
        <div class="compact-thumb" style="background: linear-gradient(135deg, #A8D4B8 0%, #5A9E78 50%, #2E7050 100%);"></div>
        <div class="compact-info">
          <div class="compact-title">Highland Escape 🏔</div>
          <div class="compact-meta">March 3 – March 5, 2024</div>
          <div class="avatar-stack">
            <div class="avatar avatar-sm avatar-b">F</div>
            <div class="avatar avatar-sm avatar-c">R</div>
            <div class="avatar avatar-sm avatar-a">Y</div>
          </div>
        </div>
        <div class="compact-right">
          <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M1 1L6 6L1 11" stroke="#B5B0AA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- New journey button -->
      <button class="btn-new-journey">
        <span>+</span>
        <span>New Journey</span>
      </button>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <!-- Home (active) -->
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M3 9.5L11 2.5L19 9.5V19C19 19.6 18.6 20 18 20H14V15H8V20H4C3.4 20 3 19.6 3 19V9.5Z" fill="#1A1A1A"/>
      </svg>
      <span class="nav-label active">Home</span>
    </div>
    <!-- Journeys -->
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="4" width="16" height="14" rx="2" stroke="#B5B0AA" stroke-width="1.5"/>
        <path d="M7 4V2M15 4V2" stroke="#B5B0AA" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M3 9H19" stroke="#B5B0AA" stroke-width="1.5"/>
        <path d="M7 13H10M7 16H12" stroke="#B5B0AA" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Journeys</span>
    </div>
    <!-- Add center -->
    <div class="nav-item" style="position:relative;">
      <div class="nav-add-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 4V16M4 10H16" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="nav-label" style="margin-top:14px;">Add</span>
    </div>
    <!-- Memories -->
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#B5B0AA" stroke-width="1.5"/>
        <rect x="12" y="3" width="7" height="7" rx="1.5" stroke="#B5B0AA" stroke-width="1.5"/>
        <rect x="3" y="12" width="7" height="7" rx="1.5" stroke="#B5B0AA" stroke-width="1.5"/>
        <rect x="12" y="12" width="7" height="7" rx="1.5" stroke="#B5B0AA" stroke-width="1.5"/>
      </svg>
      <span class="nav-label">Memories</span>
    </div>
    <!-- Profile -->
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="8" r="3.5" stroke="#B5B0AA" stroke-width="1.5"/>
        <path d="M4 19C4 15.7 7.1 13 11 13C14.9 13 18 15.7 18 19" stroke="#B5B0AA" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Profile</span>
    </div>
  </div>

</div>

</body>
</html>
