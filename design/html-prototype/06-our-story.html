<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Our Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #EDE9E3;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #F5F3EF;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 24px 80px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.10);
  display: flex; flex-direction: column;
}
.notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 120px; height: 34px; background: #EDE9E3;
  border-radius: 0 0 20px 20px; z-index: 10;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #1A1A1A; }
.status-icons { display: flex; align-items: center; gap: 6px; }

.story-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; flex-shrink: 0;
}
.back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 0 24px 48px;
  scrollbar-width: none;
  display: flex; flex-direction: column; align-items: center;
}
.scroll-content::-webkit-scrollbar { display: none; }

.story-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 26px; color: #1A1A1A;
  text-align: center; margin-bottom: 6px;
  line-height: 1.25;
}
.story-sub {
  font-size: 13px; color: #8A8580;
  text-align: center; margin-bottom: 4px;
}
.story-date {
  font-size: 12px; color: #B5B0AA;
  text-align: center; margin-bottom: 36px;
}

/* Polaroid stack */
.polaroid-stack {
  position: relative;
  width: 180px;
  height: 220px;
  margin: 0 auto 40px;
}
.polaroid {
  position: absolute;
  width: 160px;
  background: #FFFFFF;
  padding: 10px 10px 32px;
  border-radius: 2px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
  left: 50%;
}
.polaroid-photo {
  width: 100%;
  height: 128px;
  border-radius: 1px;
}
.polaroid-caption {
  text-align: center;
  font-size: 10px;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #8A8580;
  margin-top: 6px;
  line-height: 1.4;
}

.polaroid-back {
  transform: translateX(-50%) translateY(20px) rotate(-8deg);
  z-index: 1;
  opacity: 0.85;
}
.polaroid-mid {
  transform: translateX(-50%) translateY(10px) rotate(0deg);
  z-index: 2;
}
.polaroid-front {
  transform: translateX(-50%) translateY(0px) rotate(5deg);
  z-index: 3;
}
.polaroid-back .polaroid-photo {
  background: linear-gradient(135deg, #FF8C69 0%, #D4748E 50%, #7E94C9 100%);
}
.polaroid-mid .polaroid-photo {
  background: linear-gradient(135deg, #56AB2F 0%, #4A90D9 60%, #0288D1 100%);
}
.polaroid-front .polaroid-photo {
  background: linear-gradient(135deg, #FFB347 0%, #FF8C69 50%, #4FC3F7 100%);
}

/* Narrative */
.narrative {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 16px;
  color: #1A1A1A;
  text-align: center;
  line-height: 1.75;
  margin-bottom: 36px;
  width: 100%;
}

/* Divider */
.story-divider {
  width: 48px; height: 1px;
  background: #E8E4DE;
  margin: 0 auto 32px;
}

/* Action row */
.action-row {
  display: flex; justify-content: space-around; align-items: flex-start;
  width: 100%;
}
.action-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; transition: opacity 0.2s ease; flex: 1;
}
.action-item:hover { opacity: 0.7; }
.action-icon {
  width: 48px; height: 48px;
  background: #F0ECE6;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.action-label {
  font-size: 11px; font-weight: 500; color: #8A8580;
  text-align: center;
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1A1A1A"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#1A1A1A"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#1A1A1A"/><circle cx="8" cy="10" r="1.5" fill="#1A1A1A"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1A1A1A" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#1A1A1A"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#1A1A1A" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="story-header">
    <div class="back-btn">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <!-- Share icon -->
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="15" cy="4" r="2" stroke="#1A1A1A" stroke-width="1.4"/>
      <circle cx="5" cy="10" r="2" stroke="#1A1A1A" stroke-width="1.4"/>
      <circle cx="15" cy="16" r="2" stroke="#1A1A1A" stroke-width="1.4"/>
      <path d="M7 9L13 5M7 11L13 15" stroke="#1A1A1A" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="scroll-content">
    <div class="story-title">Our Bali Story ✨</div>
    <div class="story-sub">Generated from your memories</div>
    <div class="story-date">12 May 2024</div>

    <!-- Polaroid stack -->
    <div class="polaroid-stack">
      <div class="polaroid polaroid-back">
        <div class="polaroid-photo"></div>
        <div class="polaroid-caption">Uluwatu</div>
      </div>
      <div class="polaroid polaroid-mid">
        <div class="polaroid-photo"></div>
        <div class="polaroid-caption">Ubud</div>
      </div>
      <div class="polaroid polaroid-front">
        <div class="polaroid-photo"></div>
        <div class="polaroid-caption">Beach Day</div>
      </div>
    </div>

    <div class="story-divider"></div>

    <!-- Narrative -->
    <p class="narrative">
      Seven days in Bali. Sunsets that took our breath away. Random talks that turned into core memories. Laughter that echoed everywhere we went. One journey we'll never forget.
    </p>

    <div class="story-divider"></div>

    <!-- Actions -->
    <div class="action-row">
      <div class="action-item">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M19 11C19 15.4 15.4 19 11 19C6.6 19 3 15.4 3 11C3 6.6 6.6 3 11 3" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M15 3L19 3L19 7" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 3L13 9" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="action-label">Regenerate</span>
      </div>
      <div class="action-item">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M4 16L8.5 15L17.5 6C18.3 5.2 18.3 3.9 17.5 3.1L18.9 3.1C18.1 2.3 16.8 2.3 16 3.1L7 12L6 16.5L4 16Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
            <path d="M15.5 4.5L17.5 6.5" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M3 19H19" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="action-label">Edit</span>
      </div>
      <div class="action-item">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <rect x="3" y="2" width="16" height="18" rx="2" stroke="#1A1A1A" stroke-width="1.5"/>
            <path d="M7 7H15M7 11H15M7 15H11" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="action-label">Export Book</span>
      </div>
    </div>

  </div>

</div>
</body>
</html>
