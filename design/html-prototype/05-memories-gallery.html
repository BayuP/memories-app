<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #EDE9E3;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #F5F3EF;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 24px 80px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.10);
  display: flex; flex-direction: column;
}
.notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 120px; height: 34px; background: #EDE9E3;
  border-radius: 0 0 20px 20px; z-index: 10;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #1A1A1A; }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* Header */
.gallery-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 0; flex-shrink: 0;
}
.gallery-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 28px;
  color: #1A1A1A;
}

/* Filter pills */
.filter-row {
  display: flex; gap: 8px;
  padding: 16px 20px 8px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  background: #F0ECE6;
  color: #1A1A1A;
  border: none;
}
.pill.active {
  background: #1A1A1A;
  color: #FFFFFF;
}
.pill:hover:not(.active) { background: #E8E4DE; }

/* Scroll */
.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 8px 16px 100px;
  scrollbar-width: none;
}
.scroll-content::-webkit-scrollbar { display: none; }

/* Month label */
.month-label {
  font-size: 13px; font-weight: 600;
  color: #8A8580;
  letter-spacing: 0.03em;
  margin: 12px 4px 10px;
}

/* Masonry grid — 3 col */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.grid-item {
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: opacity 0.2s ease;
}
.grid-item:hover { opacity: 0.9; }
.grid-item.tall { grid-row: span 2; }

.emoji-badge {
  position: absolute;
  bottom: 6px; left: 6px;
  background: rgba(255,255,255,0.92);
  border-radius: 8px;
  padding: 2px 5px;
  font-size: 13px;
  line-height: 1.4;
  backdrop-filter: blur(4px);
}

/* Bottom nav */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 88px; background: #FFFFFF;
  border-top: 1px solid #E8E4DE;
  display: flex; align-items: flex-start; justify-content: space-around;
  padding-top: 10px; border-radius: 0 0 44px 44px;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 56px; padding: 4px 0; }
.nav-label { font-size: 10px; font-weight: 500; color: #B5B0AA; }
.nav-label.active { color: #1A1A1A; }
.nav-add-btn {
  width: 48px; height: 48px; background: #1A1A1A; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin-top: -10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1A1A1A"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#1A1A1A"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#1A1A1A"/><circle cx="8" cy="10" r="1.5" fill="#1A1A1A"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1A1A1A" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#1A1A1A"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#1A1A1A" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="gallery-header">
    <span class="gallery-title">Memories</span>
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="8.5" stroke="#1A1A1A" stroke-width="1.4"/>
      <path d="M11 7V11.5L13.5 14" stroke="#1A1A1A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Filter pills -->
  <div class="filter-row">
    <button class="pill active" onclick="setFilter(this, 'all')">All</button>
    <button class="pill" onclick="setFilter(this, 'photos')">Photos</button>
    <button class="pill" onclick="setFilter(this, 'feelings')">Feelings</button>
    <button class="pill" onclick="setFilter(this, 'notes')">Notes</button>
  </div>

  <div class="scroll-content">
    <div class="month-label">May 2024</div>

    <!-- Masonry grid -->
    <div class="photo-grid">

      <!-- Row 1: tall | short | short -->
      <div class="grid-item tall" style="background: linear-gradient(160deg, #FF8C69 0%, #FF6B35 40%, #E8502A 100%); min-height: 200px;">
        <div class="emoji-badge">🤩</div>
      </div>
      <div class="grid-item" style="background: linear-gradient(135deg, #4FC3F7, #0288D1); height: 96px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #8EBF9E, #4A8C6A); height: 96px;">
        <div class="emoji-badge">😊</div>
      </div>

      <!-- Row 2 (fills beside tall): -->
      <div class="grid-item" style="background: linear-gradient(135deg, #D4A574, #A0522D); height: 96px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #C5A8D4, #9070B5); height: 96px;"></div>

      <!-- Row 3 -->
      <div class="grid-item" style="background: linear-gradient(135deg, #FFB347, #FF8C69); height: 108px;">
        <div class="emoji-badge">😌</div>
      </div>
      <div class="grid-item tall" style="background: linear-gradient(160deg, #56AB2F, #1B6B3A); min-height: 222px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #87CEEB, #4A90D9); height: 108px;"></div>

      <!-- Row 4 -->
      <div class="grid-item" style="background: linear-gradient(135deg, #F9E07F, #F7C948); height: 108px;"></div>

      <!-- Row 5: beside tall -->
      <div class="grid-item" style="background: linear-gradient(135deg, #FFB4B4, #FFDEE9); height: 106px;">
        <div class="emoji-badge">🤩</div>
      </div>

      <!-- Row 6 -->
      <div class="grid-item" style="background: linear-gradient(135deg, #1a1a2e, #0f3460); height: 92px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #E8A87C, #D4748E); height: 92px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #7E94C9, #5B6F9C); height: 92px;">
        <div class="emoji-badge">😊</div>
      </div>

    </div>

    <div class="month-label" style="margin-top:20px;">April 2024</div>
    <div class="photo-grid">
      <div class="grid-item" style="background: linear-gradient(135deg, #C5A8D4, #9070B5); height: 92px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #8EBF9E, #4A8C6A); height: 92px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #D4A574, #A0522D); height: 92px;"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 9.5L11 2.5L19 9.5V19C19 19.6 18.6 20 18 20H14V15H8V20H4C3.4 20 3 19.6 3 19V9.5Z" stroke="#B5B0AA" stroke-width="1.5" fill="none"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="#B5B0AA" stroke-width="1.5"/><path d="M3 9H19" stroke="#B5B0AA" stroke-width="1.5"/></svg>
      <span class="nav-label">Journeys</span>
    </div>
    <div class="nav-item">
      <div class="nav-add-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4V16M4 10H16" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="nav-label" style="margin-top:14px;">Add</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" fill="#1A1A1A"/>
        <rect x="12" y="3" width="7" height="7" rx="1.5" fill="#1A1A1A"/>
        <rect x="3" y="12" width="7" height="7" rx="1.5" fill="#1A1A1A"/>
        <rect x="12" y="12" width="7" height="7" rx="1.5" fill="#1A1A1A"/>
      </svg>
      <span class="nav-label active">Memories</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="3.5" stroke="#B5B0AA" stroke-width="1.5"/><path d="M4 19C4 15.7 7.1 13 11 13C14.9 13 18 15.7 18 19" stroke="#B5B0AA" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-label">Profile</span>
    </div>
  </div>

</div>

<script>
function setFilter(el, type) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
