<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Trip People</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F5F5F5;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #FFFFFF;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  border: 1px solid #DEDEDE;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #111111; }
.status-icons { display: flex; align-items: center; gap: 6px; }

.trip-header { padding: 16px 20px 0; flex-shrink: 0; }
.trip-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.trip-name { font-size: 16px; font-weight: 600; color: #111111; }
.trip-sub { text-align: center; font-size: 13px; color: #555555; margin-bottom: 12px; }
.collab-row { display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 16px; }
.avatar {
  width: 26px; height: 26px; border-radius: 50%; border: 2px solid #FFFFFF;
  font-size: 9px; display: flex; align-items: center; justify-content: center;
  font-weight: 600; color: #fff; background: #AAAAAA;
}
.avatar-b { background: #888888; }
.avatar-c { background: #BBBBBB; }
.avatar-d { background: #999999; }
.avatar-e { background: #CCCCCC; }
.add-collab {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px dashed #DDDDDD;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.tab-bar { display: flex; border-bottom: 1px solid #EBEBEB; padding: 0 20px; flex-shrink: 0; }
.tab {
  flex: 1; text-align: center; font-size: 14px; font-weight: 500; color: #BBBBBB;
  padding: 10px 0; cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all 0.15s ease;
}
.tab.active { color: #111111; font-weight: 600; border-bottom-color: #111111; }

.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 24px 20px 100px;
  scrollbar-width: none;
}
.scroll-content::-webkit-scrollbar { display: none; }

/* Section header */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.section-title { font-size: 16px; font-weight: 600; color: #111111; }
.section-link { font-size: 13px; color: #555555; cursor: pointer; }

/* People list — no card, just rows separated by dividers */
.person-row {
  display: flex;
  align-items: center;
  padding: 16px 0;
  gap: 12px;
  cursor: pointer;
  border-bottom: 1px solid #F3F3F3;
  transition: opacity 0.15s ease;
}
.person-row:hover { opacity: 0.75; }
.person-row:last-child { border-bottom: none; }

.person-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 13px; font-weight: 600; color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: #AAAAAA;
}
.person-info { flex: 1; }
.person-name { font-size: 14px; font-weight: 600; color: #111111; }
.person-count { font-size: 13px; color: #999999; margin-top: 1px; }
.person-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.badge-creator {
  font-size: 11px;
  font-weight: 600;
  color: #555555;
  letter-spacing: 0.02em;
}

/* Add people row */
.add-people-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
  cursor: pointer;
  transition: opacity 0.15s ease;
  margin-top: 8px;
}
.add-people-row:hover { opacity: 0.75; }
.add-people-label { font-size: 14px; font-weight: 500; color: #111111; }

/* Bottom nav */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 88px; background: #FFFFFF;
  border-top: 1px solid #F3F3F3;
  display: flex; align-items: flex-start; justify-content: space-around;
  padding-top: 12px; border-radius: 0 0 40px 40px;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 56px; padding: 4px 0; }
.nav-label { font-size: 10px; font-weight: 500; color: #BBBBBB; }
.nav-label.active { color: #111111; }
.nav-add-btn {
  width: 48px; height: 48px; background: #111111; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin-top: -14px;
}
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#111111"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#111111"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#111111"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#111111"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#111111"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#111111"/><circle cx="8" cy="10" r="1.5" fill="#111111"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#111111" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#111111"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#111111" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="trip-header">
    <div class="trip-header-row">
      <div class="back-btn" onclick="history.back()">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="#111111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="trip-name">Bali Trip 🌴</span>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8.5" stroke="#BBBBBB" stroke-width="1.5"/><path d="M10 6V10.5L12.5 13" stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="trip-sub">May 8 – May 15, 2024</div>
    <div class="collab-row">
      <div class="avatar">Y</div>
      <div class="avatar avatar-b">F</div>
      <div class="avatar avatar-c">R</div>
      <div class="avatar avatar-d">M</div>
      <div class="add-collab"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1V9M1 5H9" stroke="#CCCCCC" stroke-width="1.4" stroke-linecap="round"/></svg></div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab" onclick="location.href='02-trip-timeline.html'">Timeline</div>
    <div class="tab" onclick="location.href='02b-trip-map.html'">Map</div>
    <div class="tab active">People</div>
    <div class="tab">Info</div>
  </div>

  <div class="scroll-content">
    <div class="section-header">
      <span class="section-title">People in this journey</span>
      <span class="section-link">Edit</span>
    </div>

    <!-- People rows — no card container -->
    <div class="person-row">
      <div class="person-avatar">Y</div>
      <div class="person-info">
        <div class="person-name">You</div>
        <div class="person-count">32 memories added</div>
      </div>
      <div class="person-right">
        <span class="badge-creator">Creator</span>
      </div>
    </div>

    <div class="person-row">
      <div class="person-avatar avatar-b">F</div>
      <div class="person-info">
        <div class="person-name">Fira</div>
        <div class="person-count">Added 24 memories</div>
      </div>
      <div class="person-right">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1L6 6L1 11" stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="person-row">
      <div class="person-avatar avatar-c">R</div>
      <div class="person-info">
        <div class="person-name">Raka</div>
        <div class="person-count">Added 18 memories</div>
      </div>
      <div class="person-right">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1L6 6L1 11" stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="person-row">
      <div class="person-avatar avatar-d">M</div>
      <div class="person-info">
        <div class="person-name">Maya</div>
        <div class="person-count">Added 15 memories</div>
      </div>
      <div class="person-right">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1L6 6L1 11" stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="person-row">
      <div class="person-avatar avatar-e">D</div>
      <div class="person-info">
        <div class="person-name">Deva</div>
        <div class="person-count">Added 10 memories</div>
      </div>
      <div class="person-right">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1L6 6L1 11" stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <!-- Add people -->
    <div class="add-people-row">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2V14M2 8H14" stroke="#111111" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="add-people-label">Add People</span>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 9.5L11 2.5L19 9.5V19C19 19.6 18.6 20 18 20H14V15H8V20H4C3.4 20 3 19.6 3 19V9.5Z" stroke="#BBBBBB" stroke-width="1.5" fill="none"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" fill="#111111"/><path d="M3 9H19" stroke="#FFFFFF" stroke-width="1.5"/><path d="M7 13H10M7 16H12" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-label active">Journeys</span>
    </div>
    <div class="nav-item">
      <div class="nav-add-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3V15M3 9H15" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="nav-label" style="margin-top:14px;">Add</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#BBBBBB" stroke-width="1.5"/><rect x="12" y="3" width="7" height="7" rx="1.5" stroke="#BBBBBB" stroke-width="1.5"/><rect x="3" y="12" width="7" height="7" rx="1.5" stroke="#BBBBBB" stroke-width="1.5"/><rect x="12" y="12" width="7" height="7" rx="1.5" stroke="#BBBBBB" stroke-width="1.5"/></svg>
      <span class="nav-label">Memories</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="3.5" stroke="#BBBBBB" stroke-width="1.5"/><path d="M4 19C4 15.7 7.1 13 11 13C14.9 13 18 15.7 18 19" stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-label">Profile</span>
    </div>
  </div>

</div>
</body>
</html>
