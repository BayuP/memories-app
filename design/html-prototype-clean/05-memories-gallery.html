<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F5F5F5;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #FFFFFF;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  border: 1px solid #DEDEDE;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #111111; }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* Header */
.gallery-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 20px 0; flex-shrink: 0;
}
.gallery-title {
  font-size: 28px;
  font-weight: 700;
  color: #111111;
  letter-spacing: -0.5px;
}

/* Filter pills */
.filter-row {
  display: flex; gap: 6px;
  padding: 16px 20px 8px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  background: #FFFFFF;
  color: #555555;
  border: 1px solid #EBEBEB;
  font-family: 'Inter', sans-serif;
}
.pill.active {
  background: #111111;
  color: #FFFFFF;
  border-color: #111111;
}
.pill:hover:not(.active) { border-color: #CCCCCC; }

/* Scroll */
.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 4px 20px 96px;
  scrollbar-width: none;
}
.scroll-content::-webkit-scrollbar { display: none; }

/* Month label */
.month-label {
  font-size: 11px; font-weight: 600;
  color: #999999;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 14px 0 10px;
}

/* Masonry grid — CSS columns */
.photo-grid {
  columns: 3;
  gap: 2px;
}
.grid-item {
  break-inside: avoid;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  margin-bottom: 2px;
  display: block;
  transition: opacity 0.15s ease;
}
.grid-item:hover { opacity: 0.88; }

.emoji-badge {
  position: absolute;
  bottom: 5px; left: 5px;
  background: rgba(255,255,255,0.92);
  border-radius: 100px;
  padding: 2px 6px;
  font-size: 12px;
  line-height: 1.4;
}

/* Bottom nav */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 88px; background: #FFFFFF;
  border-top: 1px solid #F3F3F3;
  display: flex; align-items: flex-start; justify-content: space-around;
  padding-top: 12px; border-radius: 0 0 40px 40px;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 56px; padding: 4px 0; }
.nav-label { font-size: 10px; font-weight: 500; color: #BBBBBB; }
.nav-label.active { color: #111111; }
.nav-add-btn {
  width: 48px; height: 48px; background: #111111; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin-top: -14px;
}
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#111111"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#111111"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#111111"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#111111"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#111111"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#111111"/><circle cx="8" cy="10" r="1.5" fill="#111111"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#111111" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#111111"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#111111" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="gallery-header">
    <span class="gallery-title">Memories</span>
    <!-- Clock icon -->
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="8.5" stroke="#111111" stroke-width="1.5"/>
      <path d="M10 6V10.5L12.5 13" stroke="#111111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Filter pills -->
  <div class="filter-row">
    <button class="pill active" onclick="setFilter(this)">All</button>
    <button class="pill" onclick="setFilter(this)">Photos</button>
    <button class="pill" onclick="setFilter(this)">Feelings</button>
    <button class="pill" onclick="setFilter(this)">Notes</button>
    <button class="pill" onclick="setFilter(this)">Bali Trip</button>
  </div>

  <div class="scroll-content">
    <div class="month-label">May 2024</div>

    <!-- Masonry grid — varying heights create natural flow -->
    <div class="photo-grid">
      <div class="grid-item" style="background: linear-gradient(160deg, #C8C8C8, #DCDCDC); height: 140px;">
        <div class="emoji-badge">🤩</div>
      </div>
      <div class="grid-item" style="background: linear-gradient(135deg, #D5D5D5, #E9E9E9); height: 90px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #CACACA, #DEDEDE); height: 90px;">
        <div class="emoji-badge">😊</div>
      </div>
      <div class="grid-item" style="background: linear-gradient(135deg, #CFCFCF, #E3E3E3); height: 90px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #C0C0C0, #D8D8D8); height: 90px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #D8D8D8, #EBEBEB); height: 110px;">
        <div class="emoji-badge">😌</div>
      </div>
      <div class="grid-item" style="background: linear-gradient(160deg, #BEBEBE, #D5D5D5); height: 148px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #CCCCCC, #E2E2E2); height: 110px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #E0E0E0, #F0F0F0); height: 110px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #D0D0D0, #E5E5E5); height: 104px;">
        <div class="emoji-badge">🤩</div>
      </div>
      <div class="grid-item" style="background: linear-gradient(135deg, #B8B8B8, #CCCCCC); height: 88px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #C5C5C5, #DCDCDC); height: 88px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #D2D2D2, #E8E8E8); height: 88px;">
        <div class="emoji-badge">😊</div>
      </div>
    </div>

    <div class="month-label">April 2024</div>
    <div class="photo-grid">
      <div class="grid-item" style="background: linear-gradient(135deg, #CCCCCC, #E0E0E0); height: 90px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #D5D5D5, #E9E9E9); height: 90px;"></div>
      <div class="grid-item" style="background: linear-gradient(135deg, #C8C8C8, #DCDCDC); height: 90px;"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 9.5L11 2.5L19 9.5V19C19 19.6 18.6 20 18 20H14V15H8V20H4C3.4 20 3 19.6 3 19V9.5Z" stroke="#BBBBBB" stroke-width="1.5" fill="none"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="#BBBBBB" stroke-width="1.5" fill="none"/><path d="M3 9H19" stroke="#BBBBBB" stroke-width="1.5"/></svg>
      <span class="nav-label">Journeys</span>
    </div>
    <div class="nav-item">
      <div class="nav-add-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3V15M3 9H15" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="nav-label" style="margin-top:14px;">Add</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" fill="#111111"/>
        <rect x="12" y="3" width="7" height="7" rx="1.5" fill="#111111"/>
        <rect x="3" y="12" width="7" height="7" rx="1.5" fill="#111111"/>
        <rect x="12" y="12" width="7" height="7" rx="1.5" fill="#111111"/>
      </svg>
      <span class="nav-label active">Memories</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="3.5" stroke="#BBBBBB" stroke-width="1.5"/><path d="M4 19C4 15.7 7.1 13 11 13C14.9 13 18 15.7 18 19" stroke="#BBBBBB" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-label">Profile</span>
    </div>
  </div>

</div>

<script>
function setFilter(el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
