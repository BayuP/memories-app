<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Checkpoint Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F5F5F5;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #FFFFFF;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  border: 1px solid #DEDEDE;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #111111; }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* Detail header */
.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 10px;
  flex-shrink: 0;
}
.back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

/* Scroll */
.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 0 24px 40px;
  scrollbar-width: none;
}
.scroll-content::-webkit-scrollbar { display: none; }

/* Title */
.detail-title {
  font-size: 24px;
  font-weight: 700;
  color: #111111;
  margin-bottom: 6px;
  line-height: 1.3;
  letter-spacing: -0.3px;
}
.detail-meta {
  font-size: 13px;
  color: #555555;
  margin-bottom: 20px;
}

/* Photo viewer */
.photo-viewer {
  width: 100%;
  height: 240px;
  border-radius: 8px;
  background: linear-gradient(135deg, #D2D2D2 0%, #E5E5E5 100%);
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}
.photo-counter {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.45);
  color: #FFFFFF;
  font-size: 12px; font-weight: 500;
  padding: 3px 9px;
  border-radius: 100px;
}

/* Collab avatars */
.collab-row {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 20px;
}
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid #FFFFFF;
  font-size: 10px; font-weight: 600; color: #fff;
  display: flex; align-items: center; justify-content: center;
  background: #AAAAAA;
}
.avatar-b { background: #888888; }
.avatar-c { background: #BBBBBB; }
.more-avatars { font-size: 12px; color: #555555; margin-left: 2px; }

/* Dividers */
.divider {
  height: 1px;
  background: #F3F3F3;
  margin: 0 0 20px;
}

/* Section labels */
.section-label {
  font-size: 11px; font-weight: 500;
  color: #999999;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

/* Feeling pill */
.feeling-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: #F5F5F5;
  border: 1px solid #EBEBEB;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px; font-weight: 500; color: #111111;
  margin-bottom: 20px;
}

/* Body text */
.body-text {
  font-size: 15px;
  color: #111111;
  line-height: 1.6;
  margin-bottom: 20px;
}
.thoughts-text {
  font-size: 15px;
  color: #111111;
  line-height: 1.6;
  margin-bottom: 24px;
}

/* Photo strip */
.photos-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.see-all { font-size: 13px; color: #999999; cursor: pointer; }
.photo-strip { display: flex; gap: 6px; }
.strip-thumb {
  width: 88px; height: 88px;
  border-radius: 6px;
  flex-shrink: 0;
  background: linear-gradient(135deg, #DEDEDE 0%, #EFEFEF 100%);
}
.strip-thumb:nth-child(2) { background: linear-gradient(135deg, #CCCCCC 0%, #E0E0E0 100%); }
.strip-thumb:nth-child(3) { background: linear-gradient(135deg, #D5D5D5 0%, #E8E8E8 100%); }
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#111111"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#111111"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#111111"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#111111"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#111111"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#111111"/><circle cx="8" cy="10" r="1.5" fill="#111111"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#111111" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#111111"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#111111" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="detail-header">
    <div class="back-btn" onclick="history.back()">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="#111111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <!-- Share -->
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="15" cy="4" r="2" stroke="#111111" stroke-width="1.5"/>
      <circle cx="5" cy="10" r="2" stroke="#111111" stroke-width="1.5"/>
      <circle cx="15" cy="16" r="2" stroke="#111111" stroke-width="1.5"/>
      <path d="M7 9L13 5M7 11L13 15" stroke="#111111" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="scroll-content">

    <div class="detail-title">Beach Day 🏖</div>
    <div class="detail-meta">May 10, 2024 &nbsp;·&nbsp; Padang Padang Beach</div>

    <!-- Photo viewer -->
    <div class="photo-viewer">
      <div class="photo-counter">1 / 6</div>
    </div>

    <!-- Collaborators -->
    <div class="collab-row">
      <div class="avatar" style="margin-left:0;">Y</div>
      <div class="avatar avatar-b" style="margin-left:-6px;">F</div>
      <div class="avatar avatar-c" style="margin-left:-6px;">R</div>
      <span class="more-avatars">+2</span>
    </div>

    <div class="divider"></div>

    <!-- Feeling -->
    <div class="section-label">Feeling</div>
    <div class="feeling-pill">
      <span>Excited</span>
      <span>🤩</span>
    </div>

    <!-- What's happening -->
    <div class="section-label">Moment</div>
    <div class="body-text">Beach day with the best people!</div>

    <div class="divider"></div>

    <!-- Thoughts -->
    <div class="section-label">Thoughts</div>
    <div class="thoughts-text">
      The water was so clear and cold. We spent the whole day here, talking about everything and nothing. One of those days you wish could last forever.
    </div>

    <div class="divider"></div>

    <!-- Photos -->
    <div class="photos-header">
      <div class="section-label" style="margin-bottom:0;">Photos</div>
      <span class="see-all">See all</span>
    </div>
    <div class="photo-strip">
      <div class="strip-thumb"></div>
      <div class="strip-thumb"></div>
      <div class="strip-thumb"></div>
    </div>

  </div>

</div>
</body>
</html>
