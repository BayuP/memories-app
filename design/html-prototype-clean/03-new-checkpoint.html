<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — New Checkpoint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F5F5F5;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #FFFFFF;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  border: 1px solid #DEDEDE;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #111111; }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* Modal header */
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 0;
  border-bottom: 1px solid #EBEBEB;
  padding-bottom: 14px;
  flex-shrink: 0;
}
.modal-close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #555555; font-size: 18px; font-weight: 400;
}
.modal-title { font-size: 16px; font-weight: 600; color: #111111; }
.modal-save {
  font-size: 16px; font-weight: 600; color: #111111;
  cursor: pointer; padding: 4px 0;
}

.modal-sub {
  text-align: center;
  font-size: 13px; color: #555555;
  padding: 10px 20px;
  flex-shrink: 0;
}

/* Scroll */
.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 0 20px 96px;
  scrollbar-width: none;
}
.scroll-content::-webkit-scrollbar { display: none; }

/* Photo area */
.photo-area {
  width: 100%;
  height: 210px;
  border-radius: 8px;
  background: linear-gradient(135deg, #DEDEDE 0%, #EFEFEF 100%);
  position: relative;
  overflow: hidden;
  margin-bottom: 24px;
  cursor: pointer;
}
.camera-btn {
  position: absolute;
  bottom: 10px; right: 10px;
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.95);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  transition: all 0.15s ease;
}
.camera-btn:hover { transform: scale(1.05); }

/* Field label */
.field-label {
  font-size: 13px; font-weight: 600; color: #111111;
  margin-bottom: 10px;
}

/* Feeling section */
.feeling-section { margin-bottom: 24px; }
.emoji-row {
  display: flex; gap: 8px;
  justify-content: space-between;
}
.emoji-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 4px;
  border-radius: 100px;
  background: transparent;
  cursor: pointer;
  border: 1.5px solid #EBEBEB;
  transition: all 0.15s ease;
}
.emoji-btn:hover { border-color: #CCCCCC; }
.emoji-btn.selected {
  border: 2px solid #111111;
  background: #FFFFFF;
}
.emoji-glyph { font-size: 20px; line-height: 1; }
.emoji-label { font-size: 10px; color: #999999; font-weight: 500; }
.emoji-btn.selected .emoji-label { color: #111111; font-weight: 600; }

/* Input fields */
.input-section { margin-bottom: 20px; }
.input-wrapper { position: relative; }
.text-input {
  width: 100%;
  background: #FFFFFF;
  border: 1px solid #EBEBEB;
  border-radius: 6px;
  padding: 11px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #111111;
  outline: none;
  transition: border-color 0.15s ease;
  resize: none;
}
.text-input::placeholder { color: #BBBBBB; }
.text-input:focus { border-color: #111111; }
.char-count {
  text-align: right;
  font-size: 11px;
  color: #BBBBBB;
  margin-top: 4px;
}
textarea.text-input {
  min-height: 88px;
  line-height: 1.6;
}

/* Bottom toolbar */
.bottom-toolbar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 88px;
  background: #FFFFFF;
  border-top: 1px solid #EBEBEB;
  display: flex;
  align-items: flex-start;
  justify-content: space-around;
  padding-top: 16px;
  border-radius: 0 0 40px 40px;
}
.toolbar-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
  transition: opacity 0.15s ease;
  flex: 1;
}
.toolbar-item:hover { opacity: 0.6; }
.toolbar-label { font-size: 11px; font-weight: 500; color: #999999; }
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#111111"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#111111"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#111111"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#111111"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#111111"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#111111"/><circle cx="8" cy="10" r="1.5" fill="#111111"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#111111" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#111111"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#111111" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Modal header -->
  <div class="modal-header">
    <div class="modal-close">&#215;</div>
    <span class="modal-title">New Checkpoint</span>
    <span class="modal-save">Save</span>
  </div>
  <div class="modal-sub">May 10, 2024 · 4:30 PM</div>

  <!-- Content -->
  <div class="scroll-content">

    <!-- Photo area -->
    <div class="photo-area">
      <div class="camera-btn">
        <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
          <path d="M6.5 1L5.2 3H2C1.4 3 1 3.4 1 4V12C1 12.6 1.4 13 2 13H14C14.6 13 15 12.6 15 12V4C15 3.4 14.6 3 14 3H10.8L9.5 1H6.5Z" stroke="#111111" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
          <circle cx="8" cy="8" r="2.5" stroke="#111111" stroke-width="1.3"/>
        </svg>
      </div>
    </div>

    <!-- Feeling -->
    <div class="feeling-section">
      <div class="field-label">How are you feeling?</div>
      <div class="emoji-row">
        <div class="emoji-btn" onclick="selectEmotion(this)">
          <span class="emoji-glyph">😊</span>
          <span class="emoji-label">Happy</span>
        </div>
        <div class="emoji-btn" onclick="selectEmotion(this)">
          <span class="emoji-glyph">🙂</span>
          <span class="emoji-label">Good</span>
        </div>
        <div class="emoji-btn" onclick="selectEmotion(this)">
          <span class="emoji-glyph">😌</span>
          <span class="emoji-label">Calm</span>
        </div>
        <div class="emoji-btn selected" onclick="selectEmotion(this)">
          <span class="emoji-glyph">🤩</span>
          <span class="emoji-label">Excited</span>
        </div>
        <div class="emoji-btn" onclick="selectEmotion(this)">
          <span class="emoji-glyph">😴</span>
          <span class="emoji-label">Tired</span>
        </div>
      </div>
    </div>

    <!-- What's happening -->
    <div class="input-section">
      <div class="field-label">What's happening?</div>
      <div class="input-wrapper">
        <input
          type="text"
          class="text-input"
          value="Beach day with the best people!"
          maxlength="100"
          oninput="updateCount(this, 'cnt1', 100)"
        >
      </div>
      <div class="char-count" id="cnt1">38/100</div>
    </div>

    <!-- Thoughts -->
    <div class="input-section">
      <div class="field-label">Write your thoughts...</div>
      <div class="input-wrapper">
        <textarea
          class="text-input"
          maxlength="500"
          placeholder="The water was so clear and cold..."
          oninput="updateCount(this, 'cnt2', 500)"
        ></textarea>
      </div>
      <div class="char-count" id="cnt2">0/500</div>
    </div>

  </div>

  <!-- Bottom toolbar -->
  <div class="bottom-toolbar">
    <div class="toolbar-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="2" y="4" width="18" height="14" rx="2.5" stroke="#999999" stroke-width="1.5"/>
        <circle cx="11" cy="11" r="3.5" stroke="#999999" stroke-width="1.5"/>
        <circle cx="16.5" cy="6.5" r="1" fill="#999999"/>
      </svg>
      <span class="toolbar-label">Photo</span>
    </div>
    <div class="toolbar-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M11 3V15M8 6V12M5 8V10M14 5V13M17 7V11" stroke="#999999" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M4 17H18" stroke="#999999" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="toolbar-label">Voice</span>
    </div>
    <div class="toolbar-item">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M11 2C7.13 2 4 5.13 4 9C4 14 11 21 11 21C11 21 18 14 18 9C18 5.13 14.87 2 11 2Z" stroke="#999999" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="11" cy="9" r="2.5" stroke="#999999" stroke-width="1.5"/>
      </svg>
      <span class="toolbar-label">Location</span>
    </div>
  </div>

</div>

<script>
function selectEmotion(el) {
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}
function updateCount(input, id, max) {
  document.getElementById(id).textContent = input.value.length + '/' + max;
}
</script>
</body>
</html>
