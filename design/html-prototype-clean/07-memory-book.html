<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories — Memory Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F5F5F5;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.phone {
  width: 390px; height: 844px;
  background: #FFFFFF;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  border: 1px solid #DEDEDE;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0; flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: #111111; }
.status-icons { display: flex; align-items: center; gap: 6px; }

.book-header {
  display: flex; align-items: center; justify-content: flex-start;
  padding: 14px 20px 0; flex-shrink: 0;
}
.back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

.scroll-content {
  flex: 1; overflow-y: auto;
  padding: 4px 24px 48px;
  scrollbar-width: none;
  display: flex; flex-direction: column; align-items: center;
}
.scroll-content::-webkit-scrollbar { display: none; }

.book-title {
  font-size: 24px;
  font-weight: 700;
  color: #111111;
  text-align: center;
  margin-bottom: 6px;
  margin-top: 8px;
  letter-spacing: -0.3px;
}
.book-sub {
  font-size: 13px; color: #555555;
  text-align: center; margin-bottom: 40px;
}

/* 3D Book */
.book-scene {
  perspective: 900px;
  width: 220px;
  height: 280px;
  margin: 0 auto 8px;
}
.book-3d {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transform: rotateY(-20deg) rotateX(5deg);
  position: relative;
}

/* Front face */
.book-front {
  position: absolute;
  width: 180px;
  height: 260px;
  background: #111111;
  border-radius: 2px 6px 6px 2px;
  right: 0;
  top: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 4px 6px 20px rgba(0,0,0,0.28);
  backface-visibility: hidden;
}
.book-front-deco {
  position: absolute;
  top: 14px; left: 14px; right: 14px; bottom: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 1px;
}
.book-front-title {
  color: rgba(255,255,255,0.95);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.5;
}
.book-front-line {
  width: 32px; height: 1px;
  background: rgba(255,255,255,0.25);
}
.book-front-date {
  color: rgba(255,255,255,0.5);
  font-size: 10px;
  letter-spacing: 0.05em;
  text-align: center;
}

/* Spine */
.book-spine {
  position: absolute;
  width: 22px;
  height: 260px;
  background: #333333;
  left: 18px;
  top: 10px;
  border-radius: 2px 0 0 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: -2px 6px 12px rgba(0,0,0,0.3);
}
.book-spine-text {
  color: rgba(255,255,255,0.4);
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
}

/* Shadow */
.book-shadow {
  width: 180px;
  height: 16px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.14) 0%, transparent 75%);
  margin: 0 auto;
  margin-top: -4px;
}

/* Page indicator */
.page-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 32px;
  margin-top: 20px;
}
.nav-arrow {
  width: 32px; height: 32px;
  background: #FAFAFA;
  border: 1px solid #EBEBEB;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s ease;
}
.nav-arrow:hover { background: #F0F0F0; }
.dots {
  display: flex; gap: 5px; align-items: center;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #DEDEDE;
  cursor: pointer;
  transition: all 0.15s ease;
}
.dot.active { background: #111111; width: 18px; border-radius: 3px; }

/* Buttons */
.btn {
  width: 100%;
  height: 48px;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
  border: none;
  margin-bottom: 10px;
  letter-spacing: -0.1px;
}
.btn-primary {
  background: #111111; color: #FFFFFF;
}
.btn-primary:hover { background: #222222; }
.btn-secondary {
  background: #FFFFFF; color: #111111;
  border: 1px solid #111111;
}
.btn-secondary:hover { background: #F5F5F5; }
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#111111"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#111111"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#111111"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#111111"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#111111"/><path d="M8 5.5C9.5 5.5 10.9 6.1 11.9 7.1L13.3 5.7C11.9 4.3 10 3.5 8 3.5C6 3.5 4.1 4.3 2.7 5.7L4.1 7.1C5.1 6.1 6.5 5.5 8 5.5Z" fill="#111111"/><circle cx="8" cy="10" r="1.5" fill="#111111"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#111111" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#111111"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6C24.5 5.3 23.8 4.8 23 4.5Z" fill="#111111" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="book-header">
    <div class="back-btn" onclick="history.back()">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="#111111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <div class="scroll-content">
    <div class="book-title">Memory Book</div>
    <div class="book-sub">A beautiful book of our journey</div>

    <!-- 3D Book -->
    <div class="book-scene">
      <div class="book-3d">
        <div class="book-spine">
          <span class="book-spine-text">Bali 2024</span>
        </div>
        <div class="book-front">
          <div class="book-front-deco"></div>
          <div class="book-front-title">BALI<br>TRIP</div>
          <div class="book-front-line"></div>
          <div class="book-front-date">May 8 – May 15, 2024</div>
        </div>
      </div>
    </div>

    <div class="book-shadow"></div>

    <!-- Page navigation -->
    <div class="page-row">
      <div class="nav-arrow" onclick="prevPage()">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M6 1L1 6L6 11" stroke="#111111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="dots">
        <div class="dot active" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
      </div>
      <div class="nav-arrow" onclick="nextPage()">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1L6 6L1 11" stroke="#111111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <!-- Action buttons -->
    <div style="width: 100%;">
      <button class="btn btn-primary">Preview Book</button>
      <button class="btn btn-secondary">Customize</button>
    </div>

  </div>

</div>

<script>
let currentPage = 0;
const totalPages = 3;

function updateDots() {
  for (let i = 0; i < totalPages; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('active', i === currentPage);
  }
}

function nextPage() {
  currentPage = (currentPage + 1) % totalPages;
  updateDots();
}

function prevPage() {
  currentPage = (currentPage - 1 + totalPages) % totalPages;
  updateDots();
}
</script>
</body>
</html>
