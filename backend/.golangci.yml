version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gofmt
    - revive

  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: range
        - name: time-naming
        - name: unexported-return

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/BayuP/memories-app

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
